<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROCADE BOARD</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg: #f2f3f8;
            --user-blue: #e8f0fe;
            --admin-white: #ffffff;
            --accent: #7b61ff;
            --gray: #999;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #222;
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: 'Pretendard', sans-serif;
        }

        /* 폰 사이즈 고정 레이아웃 */
        .phone-container {
            width: 375px; height: 812px;
            background: var(--bg);
            position: relative; display: flex; flex-direction: column;
            overflow: hidden; border-radius: 40px; border: 8px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* 상단 상태바 */
        .status-bar { padding: 14px 24px 4px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; background: white; }

        header { background: white; border-bottom: 1px solid #eee; padding: 12px 20px; z-index: 10; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .logo { font-size: 19px; font-weight: 900; color: #222; letter-spacing: -1px; }
        
        .login-ui input { width: 55px; padding: 3px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 10px; }
        .btn-action { padding: 4px 10px; background: var(--accent); color: white; border: none; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: bold; }

        /* 프로필 수정 모달 */
        #profile-edit {
            position: absolute; top: 120px; left: 20px; right: 20px; background: white;
            padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 200; display: none; border: 1px solid #eee;
        }

        /* 채팅 영역 - 스크롤 가능하게 수정 */
        #chat-view { 
            flex: 1; 
            overflow-y: auto; /* 세로 스크롤 활성화 */
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 22px; 
            padding-bottom: 100px; /* 입력창 공간 확보 */
            -webkit-overflow-scrolling: touch; /* 모바일 부드러운 스크롤 */
        }
        
        /* 스크롤바 숨기기 (선택 사항) */
        #chat-view::-webkit-scrollbar { display: none; }

        .msg-box { display: flex; flex-direction: column; }
        .bubble { max-width: 82%; padding: 12px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }

        .q-box { align-items: flex-end; }
        .q-bubble { background: var(--user-blue); border-radius: 18px 18px 2px 18px; color: #333; }
        
        .a-row { display: flex; gap: 12px; margin-top: 5px; align-items: flex-start; }
        .pfp { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 12px; flex-shrink: 0; }
        .name-row { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 800; margin-bottom: 4px; color: #222; }
        .a-bubble { background: white; border-radius: 2px 18px 18px 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); border: 0.5px solid #efefef; }

        .meta { font-size: 10px; color: var(--gray); margin-top: 5px; display: flex; align-items: center; gap: 8px; }
        .more { color: var(--accent); font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* 입력창 영역 (고정) */
        .footer-input { 
            position: absolute; bottom: 30px; width: 100%; padding: 0 20px; z-index: 10;
        }
        .input-box {
            background: white; padding: 10px 18px; border-radius: 30px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: flex; gap: 10px; align-items: center;
            border: 1px solid #f0f0f0;
        }
        textarea { flex: 1; border: none; outline: none; resize: none; font-size: 14px; padding: 5px 0; max-height: 100px; background: transparent; }
        #send-btn { width: 36px; height: 36px; background: var(--accent); color: white; border: none; border-radius: 50%; cursor: pointer; font-weight: 900; flex-shrink: 0; }

        .badge { width: 15px; height: 15px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="status-bar"><span>9:41</span> <span>📶 🔋</span></div>
    
    <header>
        <div class="header-top">
            <div class="logo">ROCADE</div>
            <div id="login-zone" class="login-ui">
                <input type="text" id="id-input" placeholder="ID">
                <input type="password" id="pw-input" placeholder="PW">
                <button class="btn-action" onclick="doLogin()">Login</button>
            </div>
        </div>
        <div style="font-size: 11px; color: #888; display:flex; justify-content: space-between;">
            <span>CAELUM · ARCADE · BOARD</span>
            <span id="edit-btn" style="display:none; color:var(--accent); cursor:pointer; font-weight:bold;" onclick="toggleEdit()">[프로필 수정]</span>
        </div>
    </header>

    <div id="profile-edit">
        <div style="font-size:13px; font-weight:bold; margin-bottom:12px; color:var(--accent);">ADMIN PROFILE EDIT</div>
        <input type="text" id="new-name" placeholder="표시 이름" style="width:100%; margin-bottom:8px; padding:8px; border:1px solid #ddd; border-radius:5px;">
        <input type="text" id="new-color" placeholder="배경 색상 (예: #7b61ff)" style="width:100%; margin-bottom:12px; padding:8px; border:1px solid #ddd; border-radius:5px;">
        <button class="btn-action" style="width:100%; padding:10px;" onclick="saveProfile()">저장하기</button>
    </div>

    <div id="chat-view"></div>

    <div class="footer-input">
        <div class="input-box">
            <textarea id="msg-text" placeholder="문의 내용을 입력하세요..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button id="send-btn" onclick="addQuestion()">↑</button>
        </div>
    </div>
</div>

<svg style="display:none">
    <symbol id="star-badge" viewBox="0 0 24 24">
        <path d="M12 0l1.5 3.5L17 2l.5 4.5L22 7l-3.5 1.5L24 12l-5.5 1.5L22 17l-4.5.5L17 22l-3.5-3.5L12 24l-1.5-3.5L7 22l-.5-4.5L2 17l3.5-1.5L0 12l5.5-1.5L2 7l4.5-.5L7 2l3.5 3.5z"/>
        <path d="M8 12.5l2.5 2.5 5-5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
</svg>

<script>
    const USERS = {
        "ARCEN": {pw: "01024773752", name: "ARCEN", col: "#FF6B6B"},
        "LUCA": {pw: "01024773752", name: "LUCA", col: "#6C5CE7"},
        "ROCADE": {pw: "01024773752", name: "ROCADE", col: "#FFB800"},
        "DORE": {pw: "01024773752", name: "DORE", col: "#20BF6B"}
    };

    let me = null;
    let db = JSON.parse(localStorage.getItem('rocade_final_v6')) || [];
    const LIMIT = 120;

    function doLogin() {
        const id = document.getElementById('id-input').value;
        const pw = document.getElementById('pw-input').value;
        if(USERS[id] && USERS[id].pw === pw) {
            me = USERS[id]; me.id = id;
            document.getElementById('login-zone').innerHTML = `<b style="font-size:11px; margin-right:5px;">${id}</b> <button onclick="location.reload()" class="btn-action" style="background:#666">OUT</button>`;
            document.getElementById('edit-btn').style.display = 'inline';
            render();
        } else alert("계정 정보가 올바르지 않습니다.");
    }

    function toggleEdit() {
        const el = document.getElementById('profile-edit');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
        document.getElementById('new-name').value = me.name;
        document.getElementById('new-color').value = me.col;
    }

    function saveProfile() {
        me.name = document.getElementById('new-name').value;
        me.col = document.getElementById('new-color').value;
        USERS[me.id].name = me.name;
        USERS[me.id].col = me.col;
        toggleEdit();
        render();
    }

    function addQuestion() {
        const txt = document.getElementById('msg-text').value;
        if(!txt.trim()) return;
        db.push({id: Date.now(), q: txt, qt: getTime(), a: null, at: null, aid: null, qo: false, ao: false});
        saveAndRender();
        const input = document.getElementById('msg-text');
        input.value = ''; input.style.height = 'auto';
    }

    function addAnswer(id) {
        const txt = prompt("답변 내용을 입력하세요:");
        if(!txt) return;
        const target = db.find(x => x.id === id);
        target.a = txt; target.at = getTime(); target.aid = me.id;
        saveAndRender();
    }

    function getTime() {
        const d = new Date();
        const ampm = d.getHours() >= 12 ? '오후' : '오전';
        const hour = d.getHours() % 12 || 12;
        return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${ampm} ${hour}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function saveAndRender() {
        localStorage.setItem('rocade_final_v6', JSON.stringify(db));
        render();
    }

    function render() {
        const view = document.getElementById('chat-view');
        view.innerHTML = '';
        db.forEach(p => {
            const qLong = p.q.length > LIMIT;
            const qTxt = (qLong && !p.qo) ? p.q.slice(0, LIMIT) + "..." : p.q;
            
            let h = `<div class="msg-box q-box">
                <div class="bubble q-bubble">${qTxt}${qLong ? `<span class="more" onclick="toggleBtn(${p.id},'q')">${p.qo?' [접기]':' [더보기]'}</span>` : ''}</div>
                <div class="meta">
                    ${(!p.a && me) ? `<button class="btn-action" style="background:white; color:#666; border:1px solid #ddd; margin-right:8px;" onclick="addAnswer(${p.id})">답변하기</button>` : ''}
                    ${p.qt}
                </div>
            </div>`;

            if(p.a) {
                const adm = USERS[p.aid];
                const aLong = p.a.length > LIMIT;
                const aTxt = (aLong && !p.ao) ? p.a.slice(0, LIMIT) + "..." : p.a;
                h += `<div class="a-row">
                    <div class="pfp" style="background:${adm.col}">${adm.name[0]}</div>
                    <div style="flex:1">
                        <div class="name-row">${adm.name} <svg class="badge" style="fill:${adm.col}"><use xlink:href="#star-badge"/></svg></div>
                        <div class="bubble a-bubble">${aTxt}${aLong ? `<span class="more" onclick="toggleBtn(${p.id},'a')">${p.ao?' [접기]':' [더보기]'}</span>` : ''}</div>
                        <div class="meta">${p.at}</div>
                    </div>
                </div>`;
            }
            view.innerHTML += h;
        });
        view.scrollTop = view.scrollHeight;
    }

    function toggleBtn(id, type) {
        const item = db.find(x => x.id === id);
        if(type==='q') item.qo = !item.qo; else item.ao = !item.ao;
        render();
    }

    render();
</script>

</body>
</html>
