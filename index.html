<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROCADE BOARD - PHOTO UPLOAD</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg: #f2f3f8; --accent: #7b61ff; --user-blue: #e8f0fe; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #111; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .phone-container {
            width: 375px; height: 95vh; max-height: 812px;
            background: var(--bg); border-radius: 40px; border: 8px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        header { background: white; border-bottom: 1px solid #eee; padding: 40px 20px 15px; flex-shrink: 0; z-index: 10; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .logo { font-size: 19px; font-weight: 900; letter-spacing: -1px; color: #222; }
        .login-ui input { width: 55px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 10px; }
        .btn-action { padding: 5px 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; }

        .nav-info { font-size: 11px; color: #888; display: flex; justify-content: space-between; align-items: center; }

        #chat-view { flex: 1; min-height: 0; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 30px; background: var(--bg); }
        #chat-view::-webkit-scrollbar { width: 4px; }
        #chat-view::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .msg-box { display: flex; flex-direction: column; width: 100%; }
        .bubble { max-width: 82%; padding: 12px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        .q-box { align-items: flex-end; }
        .q-bubble { background: var(--user-blue); border-radius: 18px 18px 2px 18px; color: #333; }
        
        .answer-group { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .a-row { display: flex; gap: 12px; align-items: flex-start; }
        .pfp { width: 40px; height: 40px; border-radius: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; background-size: cover; background-position: center; background-color: #ddd; }
        .name-row { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 800; margin-bottom: 4px; color: #222; }
        .a-bubble { background: white; border-radius: 2px 18px 18px 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 1px solid #efefef; }

        .footer-input { background: white; padding: 12px 20px 35px; border-top: 1px solid #eee; flex-shrink: 0; }
        .input-box { background: #f5f6f8; padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; border: none; outline: none; resize: none; background: transparent; font-size: 14px; max-height: 80px; }
        #send-btn { width: 34px; height: 34px; background: var(--accent); color: white; border: none; border-radius: 50%; cursor: pointer; font-weight: bold; }

        #profile-edit {
            position: absolute; top: 120px; left: 25px; right: 25px; background: white;
            padding: 25px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            z-index: 1000; display: none; border: 1px solid #eee;
        }
        .edit-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
        .file-label { display: block; font-size: 11px; color: #666; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <div class="header-top">
            <div class="logo">ROCADE</div>
            <div id="login-zone">
                <input type="text" id="id-input" placeholder="ID">
                <input type="password" id="pw-input" placeholder="PW">
                <button class="btn-action" onclick="doLogin()">Login</button>
            </div>
        </div>
        <div class="nav-info">
            <span>CAELUM · ARCADE · BOARD</span>
            <span id="edit-btn" style="display:none; color:var(--accent); cursor:pointer; font-weight:bold;" onclick="toggleEdit()">[수정]</span>
        </div>
    </header>

    <div id="profile-edit">
        <div style="font-size:14px; font-weight:bold; margin-bottom:15px; color:var(--accent); text-align:center;">ADMIN SETTINGS</div>
        <input type="text" id="new-name" placeholder="표시 이름" class="edit-input">
        <input type="text" id="new-color" placeholder="테마 색상 (#7b61ff)" class="edit-input">
        
        <label class="file-label">프로필 사진 업로드</label>
        <input type="file" id="new-pfp-file" accept="image/*" class="edit-input">
        
        <button class="btn-action" style="width:100%; padding:12px;" onclick="saveProfile()">저장 후 닫기</button>
    </div>

    <div id="chat-view"></div>

    <div class="footer-input">
        <div class="input-box">
            <textarea id="msg-text" placeholder="메시지 입력..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button id="send-btn" onclick="addQuestion()">↑</button>
        </div>
    </div>
</div>

<svg style="display:none">
    <symbol id="star-badge" viewBox="0 0 24 24"><path d="M12 0l1.5 3.5L17 2l.5 4.5L22 7l-3.5 1.5L24 12l-5.5 1.5L22 17l-4.5.5L17 22l-3.5-3.5L12 24l-1.5-3.5L7 22l-.5-4.5L2 17l3.5-1.5L0 12l5.5-1.5L2 7l4.5-.5L7 2l3.5 3.5z"/><path d="M8 12.5l2.5 2.5 5-5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></symbol>
</svg>

<script>
    const DEFAULT_USERS = {
        "ARCEN": {pw: "01024773752", name: "ARCEN", col: "#FF6B6B", pfp: ""},
        "LUCA": {pw: "01024773752", name: "LUCA", col: "#6C5CE7", pfp: ""},
        "ROCADE": {pw: "01024773752", name: "ROCADE", col: "#FFB800", pfp: ""}
    };

    let USERS = JSON.parse(localStorage.getItem('rocade_users_v12')) || DEFAULT_USERS;
    let me = null;
    let db = JSON.parse(localStorage.getItem('rocade_infinite_v12')) || [];

    function doLogin() {
        const id = document.getElementById('id-input').value;
        const pw = document.getElementById('pw-input').value;
        if(USERS[id] && USERS[id].pw === pw) {
            me = {id, ...USERS[id]};
            document.getElementById('login-zone').innerHTML = `<b style="font-size:11px;">${id}</b>`;
            document.getElementById('edit-btn').style.display = 'inline';
            render();
        } else alert("로그인 정보 확인!");
    }

    function toggleEdit() {
        const el = document.getElementById('profile-edit');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
        if(me) {
            document.getElementById('new-name').value = USERS[me.id].name;
            document.getElementById('new-color').value = USERS[me.id].col;
        }
    }

    async function saveProfile() {
        const name = document.getElementById('new-name').value;
        const col = document.getElementById('new-color').value;
        const pfpFile = document.getElementById('new-pfp-file').files[0];
        
        USERS[me.id].name = name || USERS[me.id].name;
        USERS[me.id].col = col || USERS[me.id].col;

        if (pfpFile) {
            const reader = new FileReader();
            reader.onloadend = function() {
                USERS[me.id].pfp = reader.result; // Base64 데이터로 저장
                finishSave();
            }
            reader.readAsDataURL(pfpFile);
        } else {
            finishSave();
        }
    }

    function finishSave() {
        localStorage.setItem('rocade_users_v12', JSON.stringify(USERS));
        toggleEdit(); 
        render();
    }

    function addQuestion() {
        const el = document.getElementById('msg-text');
        if(!el.value.trim()) return;
        db.push({id: Date.now(), q: el.value, answers: []});
        localStorage.setItem('rocade_infinite_v12', JSON.stringify(db));
        el.value = ''; el.style.height = 'auto';
        render();
    }

    function addAnswer(id) {
        const txt = prompt("답변 입력:");
        if(!txt) return;
        const target = db.find(x => x.id === id);
        target.answers.push({aid: me.id, text: txt, time: Date.now()});
        localStorage.setItem('rocade_infinite_v12', JSON.stringify(db));
        render();
    }

    function render() {
        const view = document.getElementById('chat-view');
        view.innerHTML = '';
        db.forEach(p => {
            let h = `<div class="msg-box q-box">
                <div class="bubble q-bubble">${p.q}</div>
                <div style="font-size:10px; color:#999; margin-top:5px;">
                    ${me ? `<span style="cursor:pointer; color:var(--accent); font-weight:bold;" onclick="addAnswer(${p.id})">+ 답변 추가하기</span>` : ''}
                </div>
            </div>`;

            if(p.answers && p.answers.length > 0) {
                h += `<div class="answer-group">`;
                p.answers.forEach(ans => {
                    const adm = USERS[ans.aid] || {name: ans.aid, col: "#999", pfp: ""};
                    const pfpBg = adm.pfp ? `background-image:url('${adm.pfp}')` : `background-color:${adm.col}`;
                    h += `<div class="a-row">
                        <div class="pfp" style="${pfpBg}">${adm.pfp ? '' : adm.name[0]}</div>
                        <div style="flex:1">
                            <div class="name-row">${adm.name} <svg class="badge" style="fill:${adm.col}"><use xlink:href="#star-badge"/></svg></div>
                            <div class="bubble a-bubble">${ans.text}</div>
                        </div>
                    </div>`;
                });
                h += `</div>`;
            }
            view.innerHTML += h;
        });
        view.scrollTop = view.scrollHeight;
    }
    render();
</script>
</body>
</html>
