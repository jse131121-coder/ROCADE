<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROCADE BOARD ULTIMATE</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg: #f2f3f8; --accent: #7b61ff; --user-blue: #e8f0fe; --gray: #999; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #111; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* 컨테이너 사이즈 미세 조정 */
        .phone-container {
            width: 380px; height: 820px; /* 아주 살짝 늘림 */
            background: var(--bg); border-radius: 45px; border: 9px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        /* 헤더 */
        header { background: white; border-bottom: 1px solid #eee; padding: 45px 20px 15px; flex-shrink: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; color: #222; }
        .menu-btn { font-size: 20px; cursor: pointer; color: #555; padding: 0 5px; }

        /* 로그인 레이어 */
        #login-layer { 
            position: absolute; top: 90px; right: 20px; background: white; padding: 15px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 200; display: none; border: 1px solid #eee;
        }
        #login-layer input { width: 70px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; margin-right: 5px; outline: none; }

        .nav-info { font-size: 11px; color: #888; margin-top: 10px; display: flex; justify-content: space-between; }

        /* 채팅 영역 (검수 핵심: 상단 잘림 방지 및 스크롤) */
        #chat-view { 
            flex: 1; min-height: 0; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 25px; background: var(--bg);
        }
        #chat-view::-webkit-scrollbar { width: 4px; }
        #chat-view::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* 말풍선 */
        .msg-box { display: flex; flex-direction: column; width: 100%; }
        .bubble { max-width: 85%; padding: 13px 17px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        .q-box { align-items: flex-end; }
        .q-bubble { background: var(--user-blue); border-radius: 18px 18px 2px 18px; color: #333; }
        
        .a-row { display: flex; gap: 12px; margin-top: 5px; align-items: flex-start; }
        .pfp { width: 42px; height: 42px; border-radius: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; }
        .name-row { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 800; margin-bottom: 4px; color: #222; }
        .a-bubble { background: white; border-radius: 2px 18px 18px 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; }

        /* 인라인 답변창 스타일 */
        .reply-area { width: 100%; margin-top: 10px; display: flex; gap: 8px; }
        .reply-input { flex: 1; padding: 8px 12px; border: 1px solid var(--accent); border-radius: 10px; font-size: 13px; outline: none; }

        /* 푸터 */
        .footer-input { background: white; padding: 15px 20px 35px; border-top: 1px solid #eee; flex-shrink: 0; }
        .input-box { background: #f5f6f8; padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; border: none; outline: none; resize: none; background: transparent; font-size: 14px; max-height: 80px; }
        #send-btn { width: 36px; height: 36px; background: var(--accent); color: white; border: none; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 18px; }

        /* 프로필 수정 */
        #profile-edit {
            position: absolute; top: 130px; left: 30px; right: 30px; background: white; padding: 25px; 
            border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); z-index: 1000; display: none;
        }
        .edit-input { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-action { padding: 6px 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .badge { width: 15px; height: 15px; }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <div class="header-top">
            <div class="logo">ROCADE</div>
            <div class="menu-btn" onclick="toggleLogin()">⋮</div>
        </div>
        
        <div id="login-layer">
            <div id="login-form">
                <input type="text" id="id-in" placeholder="ID">
                <input type="password" id="pw-in" placeholder="PW">
                <button class="btn-action" onclick="doLogin()">OK</button>
            </div>
            <div id="user-info" style="display:none; font-size:12px; font-weight:bold;">
                <span id="me-name"></span>님 <button class="btn-action" style="background:#666; margin-left:10px;" onclick="location.reload()">OUT</button>
            </div>
        </div>

        <div class="nav-info">
            <span>CAELUM · ARCADE · BOARD</span>
            <span id="edit-btn" style="display:none; color:var(--accent); cursor:pointer; font-weight:bold;" onclick="toggleEdit()">[프로필 수정]</span>
        </div>
    </header>

    <div id="profile-edit">
        <div style="font-size:15px; font-weight:bold; margin-bottom:15px; color:var(--accent); text-align:center;">ADMIN PROFILE</div>
        <input type="text" id="new-name" class="edit-input" placeholder="이름">
        <input type="text" id="new-color" class="edit-input" placeholder="색상 (#7b61ff)">
        <button class="btn-action" style="width:100%; padding:12px;" onclick="saveProfile()">저장 및 닫기</button>
    </div>

    <div id="chat-view"></div>

    <div class="footer-input">
        <div class="input-box">
            <textarea id="msg-text" placeholder="질문을 남겨주세요..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button id="send-btn" onclick="addQ()">↑</button>
        </div>
    </div>
</div>

<svg style="display:none">
    <symbol id="star-badge" viewBox="0 0 24 24"><path d="M12 0l1.5 3.5L17 2l.5 4.5L22 7l-3.5 1.5L24 12l-5.5 1.5L22 17l-4.5.5L17 22l-3.5-3.5L12 24l-1.5-3.5L7 22l-.5-4.5L2 17l3.5-1.5L0 12l5.5-1.5L2 7l4.5-.5L7 2l3.5 3.5z"/><path d="M8 12.5l2.5 2.5 5-5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></symbol>
</svg>

<script>
    const USERS = {
        "ARCEN": {pw: "01024773752", name: "ARCEN", col: "#FF6B6B"},
        "LUCA": {pw: "01024773752", name: "LUCA", col: "#6C5CE7"},
        "ROCADE": {pw: "01024773752", name: "ROCADE", col: "#FFB800"}
    };

    let me = null;
    let db = JSON.parse(localStorage.getItem('rocade_ultimate')) || [];
    let replyingId = null;

    function toggleLogin() {
        const el = document.getElementById('login-layer');
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function doLogin() {
        const id = document.getElementById('id-in').value;
        const pw = document.getElementById('pw-in').value;
        if(USERS[id] && USERS[id].pw === pw) {
            me = {id, ...USERS[id]};
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('me-name').innerText = id;
            document.getElementById('edit-btn').style.display = 'inline';
            render();
        } else alert("정보가 틀렸습니다.");
    }

    function toggleEdit() {
        const el = document.getElementById('profile-edit');
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        document.getElementById('new-name').value = me.name;
        document.getElementById('new-color').value = me.col;
    }

    function saveProfile() {
        me.name = document.getElementById('new-name').value;
        me.col = document.getElementById('new-color').value;
        USERS[me.id].name = me.name;
        USERS[me.id].col = me.col;
        toggleEdit(); render();
    }

    function addQ() {
        const txt = document.getElementById('msg-text').value;
        if(!txt.trim()) return;
        db.push({id: Date.now(), q: txt, a: null, aid: null});
        localStorage.setItem('rocade_ultimate', JSON.stringify(db));
        document.getElementById('msg-text').value = '';
        render();
    }

    function openReply(id) {
        replyingId = id;
        render();
    }

    function submitA(id) {
        const txt = document.getElementById(`rep-${id}`).value;
        if(!txt.trim()) return;
        const target = db.find(x => x.id === id);
        target.a = txt; target.aid = me.id;
        localStorage.setItem('rocade_ultimate', JSON.stringify(db));
        replyingId = null;
        render();
    }

    function render() {
        const view = document.getElementById('chat-view');
        view.innerHTML = '';
        db.forEach(p => {
            let h = `<div class="msg-box q-box">
                <div class="bubble q-bubble">${p.q}</div>
                ${(!p.a && me && replyingId !== p.id) ? `<div style="margin-top:5px; font-size:11px; color:var(--accent); cursor:pointer; font-weight:bold;" onclick="openReply(${p.id})">답변하기</div>` : ''}
                ${(replyingId === p.id) ? `
                    <div class="reply-area">
                        <input type="text" id="rep-${p.id}" class="reply-input" placeholder="답변 중입니다...">
                        <button class="btn-action" onclick="submitA(${p.id})">전송</button>
                    </div>` : ''}
            </div>`;

            if(p.a) {
                const adm = USERS[p.aid] || {name: "ADMIN", col: "#999"};
                h += `<div class="a-row">
                    <div class="pfp" style="background:${adm.col}">${adm.name[0]}</div>
                    <div style="flex:1">
                        <div class="name-row">${adm.name} <svg class="badge" style="fill:${adm.col}"><use xlink:href="#star-badge"/></svg></div>
                        <div class="bubble a-bubble">${p.a}</div>
                    </div>
                </div>`;
            }
            view.innerHTML += h;
        });
        view.scrollTop = view.scrollHeight;
    }
    render();
</script>
</body>
</html>
